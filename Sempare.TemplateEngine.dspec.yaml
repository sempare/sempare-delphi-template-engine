# DPM package spec file
min dpm client version: 1.0.0
metadata:
  id: Sempare.TemplateEngine
  version: 1.8.2
  description: 'Sempare Template (scripting) Engine for Delphi allows for flexible dynamic text generation. It can be used for generating email, html, reports, source code, xml, configuration, etc.'
  authors:
    - Conrad Vermeulen
  projectUrl: https://github.com/sempare/sempare-delphi-template-engine
  repositoryUrl: https://github.com/sempare/sempare-delphi-template-engine
  license: Apache-2.0
  copyright: Conrad Vermeulen and contributors
  tags:
    - templates
    - reports
  readme: README.md
variables:
  packagesource: RAD Studio $compilerNoPrefix$
targetPlatforms:
  - compiler: delphi10.3
    platforms:
      - win32
      - win64
      - macos32
      - macos64
      - linux64
  - compiler: delphi10.4
    platforms:
      - win32
      - win64
      - macos64
      - linux64
  - compiler from: delphi11.0
    compiler to: delphi12.0
    platforms:
      - win32
      - win64
      - macos64
      - macosarm64
      - linux64
  - compiler: delphi13.0
    platforms:
      - win32
      - win64
      - winarm64ec
      - macos64
      - macosarm64
      - linux64
templates:
  - name: default
    source:
      - src: ./LICENSE
      - src: ./Src/*.pas
      - src: ./Src/*.inc
      - src: /packages/$packageSource$/Sempare.TemplateR.dproj
      - src: /packages/$packageSource$/Sempare.TemplateR.dpk
    build:
      - project: ./packages/$packageSource$/Sempare.TemplateR.dproj
        references:
          - dbrtl
    package definitions:
      - project: ./packages/$packageSource/Sempare.Template.Pkg.dproj
        kind: runtime
        files:
          - ./Src/*.inc
          - ./Src/*.pas
          - ./Src/*.inc
        requires:
          - rtl
